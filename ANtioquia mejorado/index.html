<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sistema de Notas – Colegio Antioquia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g50:#f0fdf4;--g100:#dcfce7;--g200:#bbf7d0;--g300:#86efac;--g400:#4ade80;
  --g500:#22c55e;--g600:#16a34a;--g700:#15803d;--g800:#166534;--g900:#14532d;--g950:#052e16;
  --sidebar-w:240px;--radius:10px;
}
body{font-family:'Inter',sans-serif;background:#f0fdf4;color:#1e293b;min-height:100vh}
body.dark{background:#071a0d;color:#e2e8f0}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,var(--g950) 0%,var(--g900) 50%,var(--g800) 100%);
  display:flex;flex-direction:column;padding:16px 12px;flex-shrink:0;position:fixed;
  top:0;left:0;bottom:0;z-index:100;transition:transform .25s}
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{background:white;border-bottom:1px solid var(--g100);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50}
body.dark #topbar{background:#0a1f10;border-color:#1a3322}
#page-content{padding:24px;flex:1}

/* ── SIDEBAR ── */
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:6px 4px 16px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:12px}
.sidebar-logo img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:white}
.sidebar-logo-txt{line-height:1.2}
.sidebar-logo-txt b{color:white;font-size:.9rem;font-family:'Plus Jakarta Sans',sans-serif}
.sidebar-logo-txt span{color:var(--g300);font-size:.8rem;display:block}
.sidebar-section{font-size:.65rem;font-weight:700;color:var(--g400);letter-spacing:.08em;text-transform:uppercase;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;
  color:var(--g100);font-size:.84rem;font-weight:500;cursor:pointer;transition:background .15s,color .15s;
  text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.1)}
.nav-item.active{background:white;color:var(--g700);font-weight:700}
.nav-item .ico{font-size:1.05rem;flex-shrink:0;width:20px;text-align:center}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.12)}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 4px;margin-bottom:6px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--g500);color:var(--g950);
  font-weight:800;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-info b{color:white;font-size:.8rem;display:block;max-width:155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-info span{color:var(--g300);font-size:.7rem}
.btn-logout{width:100%;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,.15);
  color:#fca5a5;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:background .15s}
.btn-logout:hover{background:rgba(239,68,68,.3)}

/* ── TOPBAR ── */
.page-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.25rem;font-weight:800;color:var(--g900)}
body.dark .page-title{color:var(--g300)}
.topbar-right{display:flex;align-items:center;gap:10px}
.dark-toggle{background:none;border:1px solid var(--g200);border-radius:8px;padding:6px 10px;
  cursor:pointer;font-size:.8rem;color:var(--g700);font-weight:600;transition:all .15s}
.dark-toggle:hover{background:var(--g50)}
body.dark .dark-toggle{border-color:var(--g700);color:var(--g300)}

/* ── CARDS ── */
.card{background:white;border-radius:12px;border:1px solid var(--g100);box-shadow:0 1px 4px rgba(0,0,0,.05)}
body.dark .card{background:#0e2318;border-color:#1e3d28}
.card-header{padding:16px 20px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:10px}
body.dark .card-header{border-color:#1e3d28}
.card-body{padding:20px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:white;border-radius:12px;padding:18px 20px;border:1px solid var(--g100);
  position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
body.dark .stat-card{background:#0e2318;border-color:#1e3d28}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.green::before{background:linear-gradient(90deg,var(--g600),var(--g400))}
.stat-card.blue::before{background:linear-gradient(90deg,#0284c7,#38bdf8)}
.stat-card.purple::before{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.stat-card.orange::before{background:linear-gradient(90deg,#ea580c,#fb923c)}
.stat-card .stat-label{font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.stat-card .stat-value{font-size:2rem;font-weight:800;color:var(--g800);line-height:1.1;margin-top:4px}
body.dark .stat-card .stat-value{color:var(--g300)}
.stat-card .stat-icon{position:absolute;right:14px;top:14px;font-size:1.5rem;opacity:.6}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.84rem;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--g600);color:white}
.btn-primary:hover{background:var(--g700)}
.btn-secondary{background:white;color:var(--g700);border:1px solid var(--g300)}
.btn-secondary:hover{background:var(--g50)}
body.dark .btn-secondary{background:#0e2318;color:var(--g300);border-color:var(--g800)}
.btn-danger{background:#dc2626;color:white}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── FORMS ── */
.form-group{margin-bottom:12px}
.form-label{font-size:.78rem;font-weight:600;color:#374151;margin-bottom:5px;display:block}
body.dark .form-label{color:#94a3b8}
.form-input{width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;
  font-size:.85rem;outline:none;transition:border-color .15s,box-shadow .15s;background:white;font-family:inherit}
.form-input:focus{border-color:var(--g500);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
body.dark .form-input{background:#0e2318;border-color:#2d4a38;color:#e2e8f0}
body.dark .form-input:focus{border-color:var(--g500)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:0 0 12px 12px}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{background:var(--g50);color:var(--g800);font-weight:700;padding:10px 14px;text-align:left;
   font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--g200);white-space:nowrap}
body.dark th{background:#0f2318;color:var(--g400);border-color:#1e3d28}
td{padding:10px 14px;border-bottom:1px solid var(--g50);color:#374151;vertical-align:middle}
body.dark td{border-color:#1a2e20;color:#cbd5e1}
tr:hover td{background:var(--g50)}
body.dark tr:hover td{background:#0f2318}
tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.73rem;font-weight:700;letter-spacing:.04em}
.badge-AD{background:#dcfce7;color:#14532d;border:1px solid #86efac}
.badge-A{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.badge-B{background:#fef9c3;color:#713f12;border:1px solid #fde047}
.badge-C{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5}
.badge-green{background:var(--g100);color:var(--g800)}
.badge-gray{background:#f1f5f9;color:#64748b}
.badge-red{background:#fee2e2;color:#7f1d1d}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-yellow{background:#fef9c3;color:#713f12}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);
  width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}
body.dark .modal-box{background:#0e2318;border:1px solid #1e3d28}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
body.dark .modal-header{border-color:#1e3d28}
.modal-header h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.05rem;font-weight:800;color:var(--g900)}
body.dark .modal-header h3{color:var(--g300)}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.4rem;color:#94a3b8;line-height:1;padding:2px 6px;border-radius:6px}
.modal-close:hover{background:var(--g50);color:var(--g700)}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--g100);display:flex;justify-content:flex-end;gap:8px}
body.dark .modal-footer{border-color:#1e3d28}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 18px;border-radius:10px;font-size:.84rem;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.2);animation:slideUp .3s ease;min-width:220px}
.toast-success{background:#15803d;color:white}
.toast-error{background:#dc2626;color:white}
.toast-info{background:#0284c7;color:white}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LOGIN ── */
#login-screen{display:none;min-height:100vh;background:linear-gradient(135deg,var(--g950) 0%,var(--g900) 45%,var(--g700) 100%);
  align-items:center;justify-content:center;padding:20px}
.login-card{background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo img{width:52px;height:52px;border-radius:50%;object-fit:cover}
.login-logo-txt b{display:block;font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;color:var(--g900)}
.login-logo-txt span{font-size:.8rem;color:#64748b}
.login-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:800;color:var(--g900);margin-bottom:4px}
.login-sub{color:#64748b;font-size:.85rem;margin-bottom:24px}
.login-error{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d;border-radius:8px;padding:10px 14px;font-size:.83rem;margin-bottom:14px;display:none}

/* ── LOADING ── */
.spinner{width:30px;height:30px;border:3px solid var(--g100);border-top-color:var(--g600);
  border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-state{text-align:center;padding:50px 20px;color:#94a3b8}
.empty-state .ico{font-size:2.5rem;margin-bottom:10px}
.empty-state p{font-weight:500;font-size:.9rem}

/* ── LIBRETA / PDF ── */
.libreta-header{background:linear-gradient(135deg,var(--g900),var(--g700));color:white;border-radius:12px;padding:22px;margin-bottom:18px}
.libreta-header h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800}
.libreta-header p{font-size:.85rem;opacity:.85;margin-top:3px}
.estado-chip{display:inline-block;padding:5px 14px;border-radius:999px;font-weight:700;font-size:.82rem;margin-top:10px}
.estado-PROMOVIDO{background:#dcfce7;color:#14532d}
.estado-EN_RECUPERACION{background:#fef9c3;color:#713f12}
.estado-REPITENTE{background:#fee2e2;color:#7f1d1d}

/* ── ASISTENCIA TABLE ── */
.asist-PRESENTE{color:#15803d;font-weight:700}
.asist-AUSENTE{color:#dc2626;font-weight:700}
.asist-TARDANZA{color:#ca8a04;font-weight:700}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--g50);border-radius:10px;padding:4px;margin-bottom:20px;flex-wrap:wrap}
body.dark .tabs{background:#0f2318}
.tab{padding:7px 16px;border-radius:7px;border:none;background:none;cursor:pointer;
  font-size:.83rem;font-weight:600;color:#64748b;transition:all .15s}
.tab.active{background:white;color:var(--g700);box-shadow:0 1px 4px rgba(0,0,0,.1)}
body.dark .tab.active{background:#1e3d28;color:var(--g300)}
body.dark .tab{color:#94a3b8}

/* ── ALERT BOX ── */
.alert{padding:11px 14px;border-radius:8px;font-size:.83rem;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.alert-warning{background:#fef9c3;border-left:4px solid #ca8a04;color:#713f12}
.alert-danger{background:#fee2e2;border-left:4px solid #dc2626;color:#7f1d1d}
.alert-info{background:#dbeafe;border-left:4px solid #0284c7;color:#1e40af}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .form-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
.menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:1.4rem;padding:4px}
@media(max-width:768px){.menu-btn{display:block}}
</style>
</head>
<!-- bcryptjs eliminado: la verificación de contraseñas la hace Supabase Auth de forma segura en su servidor -->
<body>


<!-- LOGIN -->
<div id="login-screen" style="display:flex">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4DltOCEadIIcKcVokCns2RUpOt_UZwot5zw&s" alt="Logo" onerror="this.style.display='none'"/>
      <div class="login-logo-txt">
        <b>Colegio Antioquia</b>
        <span>Sistema de Control de Notas</span>
      </div>
    </div>
    <h1 class="login-title">Iniciar sesión</h1>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input class="form-input" type="email" id="login-correo" placeholder="usuario@colegio.edu.pe" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:11px;font-size:.95rem;margin-top:6px" onclick="doLogin()" id="login-btn">
      Ingresar al sistema
    </button>
    <p style="text-align:center;font-size:.75rem;color:#94a3b8;margin-top:18px">
      Roles: Administrador · Docente · Estudiante · Padre de Familia
    </p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4DltOCEadIIcKcVokCns2RUpOt_UZwot5zw&s" alt="Logo" onerror="this.style.display='none'"/>
      <div class="sidebar-logo-txt"><b>Colegio</b><span>Antioquia</span></div>
    </div>
    <div id="nav-container"></div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <b id="user-name">—</b>
          <span id="user-role">—</span>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">🚪 Cerrar sesión</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="page-title" id="topbar-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button class="dark-toggle" onclick="toggleDark()">🌙 Modo oscuro</button>
      </div>
    </div>
    <div id="page-content">
      <div class="loading-page"><div class="spinner"></div><p>Cargando...</p></div>
    </div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// SUPABASE INIT
// ═══════════════════════════════════════════════════════════════
const SUPA_URL = 'https://jwwhrckqgpdkmheblgqu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3d2hyY2txZ3Bka21oZWJsZ3F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NDg0NzAsImV4cCI6MjA5NTMyNDQ3MH0.NXywu-CX5612cuH7JiDdQZ9xFTrcp1jdDl4MW4v-rDQ';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let currentPerfil = null;

// ID normalizer – Supabase devuelve bigint como string en JS
const norm = v => v !== null && v !== undefined ? String(v) : null;

// ═══════════════════════════════════════════════════════════════
// AUTH — usa Supabase Auth (bcrypt real, manejo de sesiones seguro)
// NO se tocan contraseñas en el frontend
// ═══════════════════════════════════════════════════════════════
async function doLogin() {
  const correo = document.getElementById('login-correo').value.trim();
  const pass   = document.getElementById('login-pass').value;
  const errEl  = document.getElementById('login-error');
  const btn    = document.getElementById('login-btn');
  errEl.style.display = 'none';
  if (!correo || !pass) { showError(errEl, 'Ingresa correo y contraseña'); return; }
  btn.textContent = 'Ingresando...'; btn.disabled = true;

  try {
    // 1. Supabase Auth verifica email + contraseña con bcrypt de forma segura
    //    La contraseña NUNCA llega a tu código ni a tu tabla — Supabase lo maneja
    const { data: authData, error: authError } = await sb.auth.signInWithPassword({
      email: correo,
      password: pass
    });

    if (authError) {
      // Mensaje amigable según tipo de error
      if (authError.message.includes('Invalid login')) {
        showError(errEl, 'Correo o contraseña incorrectos');
      } else if (authError.message.includes('Email not confirmed')) {
        showError(errEl, 'Debes confirmar tu correo antes de ingresar');
      } else {
        showError(errEl, 'Error al iniciar sesión: ' + authError.message);
      }
      return;
    }

    // 2. Con la sesión activa, obtener el perfil del usuario desde tu tabla
    //    usando el auth_id que vincula ambos sistemas
    const authUid = authData.user.id;
    const { data: userRow, error: userError } = await sb
      .from('usuarios')
      .select('*')
      .eq('auth_id', authUid)
      .eq('activo', true)
      .single();

    if (userError || !userRow) {
      await sb.auth.signOut();
      showError(errEl, 'Usuario no encontrado o inactivo. Contacta al administrador.');
      return;
    }

    currentUser = userRow;

    // 3. Cargar perfil extendido según rol
    if (userRow.rol === 'DOCENTE') {
      const { data } = await sb.from('docentes').select('*').eq('usuario_id', norm(userRow.id)).single();
      currentPerfil = data;
    } else if (userRow.rol === 'ESTUDIANTE') {
      const { data } = await sb.from('estudiantes').select('*, secciones(nombre, grado)').eq('usuario_id', norm(userRow.id)).single();
      currentPerfil = data;
    } else if (userRow.rol === 'PADRE_FAMILIA') {
      const { data } = await sb.from('padres_familia').select('*, estudiantes(nombre,apellido,grado)').eq('usuario_id', norm(userRow.id)).single();
      currentPerfil = data;
    }

    // 4. Guardar en sessionStorage (más seguro que localStorage para datos de sesión)
    sessionStorage.setItem('ca_user', JSON.stringify(currentUser));
    sessionStorage.setItem('ca_perfil', JSON.stringify(currentPerfil));
    showApp();

  } catch (e) {
    showError(errEl, 'Error de conexión: ' + e.message);
  } finally {
    btn.textContent = 'Ingresar al sistema';
    btn.disabled = false;
  }
}

function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }

async function doLogout() {
  // Cerrar sesión en Supabase Auth (invalida el token JWT)
  await sb.auth.signOut();
  currentUser = null;
  currentPerfil = null;
  sessionStorage.removeItem('ca_user');
  sessionStorage.removeItem('ca_perfil');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// APP INIT — restaurar sesión si ya estaba logueado
// ═══════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  // Supabase Auth maneja la sesión automáticamente con cookies seguras
  const { data: { session } } = await sb.auth.getSession();

  if (session) {
    // Sesión activa: restaurar perfil desde sessionStorage o volver a cargarlo
    const savedUser = sessionStorage.getItem('ca_user');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      currentPerfil = JSON.parse(sessionStorage.getItem('ca_perfil') || 'null');
      showApp();
    } else {
      // Sesión activa pero sin datos en storage: recargar perfil
      const { data: userRow } = await sb.from('usuarios')
        .select('*').eq('auth_id', session.user.id).single();
      if (userRow) {
        currentUser = userRow;
        sessionStorage.setItem('ca_user', JSON.stringify(currentUser));
        showApp();
      }
    }
  }

  // Enter en campo contraseña
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Dark mode
  if (localStorage.getItem('ca_dark') === '1') document.body.classList.add('dark');
});

function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('ca_dark', document.body.classList.contains('dark') ? '1' : '0');
}

  const u = currentUser;
  document.getElementById('user-name').textContent = u.nombre;

  document.getElementById('user-avatar').textContent = (u.nombre || '?')[0].toUpperCase();

  const nav = NAV_CONFIG[u.rol] || [];

async function renderPage(id) {
  const titles = {
    'dashboard':'Dashboard', 'dashboard-docente':'Mi Dashboard',
    'estudiantes':'Estudiantes', 'docentes':'Docentes', 'cursos':'Cursos y Competencias',
    'secciones':'Secciones', 'asignaciones':'Asignaciones', 'ano-escolar':'Año Escolar',
    'evaluaciones':'Evaluaciones', 'calificativo-bimestral':'Calificativo Bimestral',
    'calificativo-final':'Calificativo Final', 'asistencia':'Registro de Asistencia',
    'consolidado':'Consolidado de Notas','mis-notas':'Mis Notas',
    'mi-asistencia':'Mi Asistencia', 'mi-libreta':'Mi Libreta',
    'hijo-notas':'Notas de Mi Hijo','hijo-asistencia':'Asistencia del Hijo','hijo-libreta':'Libreta Académica',
  };
  document.getElementById('topbar-title').textContent = titles[id] || id;
  setContent('<div class="loading-page"><div class="spinner"></div></div>');

  try {
    switch(id) {
      case 'dashboard': await pageDashboard(); break;
      case 'dashboard-docente': await pageDashboardDocente(); break;
      case 'estudiantes': await pageEstudiantes(); break;
      case 'docentes': await pageDocentes(); break;
      case 'cursos': await pageCursos(); break;
      case 'secciones': await pageSecciones(); break;
      case 'asignaciones': await pageAsignaciones(); break;
      case 'ano-escolar': await pageAnoEscolar(); break;
      case 'evaluaciones': await pageEvaluaciones(); break;
      case 'calificativo-bimestral': await pageCalificativoBimestral(); break;
      case 'calificativo-final': await pageCalificativoFinal(); break;
      case 'asistencia': await pageAsistencia(); break;
      case 'consolidado': await pageConsolidado(); break;
      case 'mis-notas': await pageMisNotas(); break;
      case 'mi-asistencia': await pageMiAsistencia(); break;
      case 'mi-libreta': await pageLibreta(currentPerfil?.id); break;
      case 'hijo-notas': await pageHijoNotas(); break;
      case 'hijo-asistencia': await pageHijoAsistencia(); break;
      case 'hijo-libreta': await pageLibreta(currentPerfil?.estudiante_id || currentPerfil?.estudiantes?.id); break;
      default: setContent(`<div class="empty-state"><div class="ico">🚧</div><p>Página en construcción</p></div>`);
    }
  } catch(e) {
    setContent(`<div class="alert alert-danger">⚠️ Error al cargar: ${e.message}</div>`);
    console.error(e);
  }
}

// DASHBOARD ADMIN

async function pageDashboard() {
  const [{ count: totalEst }, { count: totalDoc }, { count: totalCursos }, { data: bimestres }, { data: notas }, { data: asist }] = await Promise.all([
    sb.from('estudiantes').select('*',{count:'exact',head:true}),
    sb.from('docentes').select('*',{count:'exact',head:true}),
    sb.from('cursos').select('*',{count:'exact',head:true}),
    sb.from('bimestres').select('*').order('numero'),
    sb.from('calificativo_bimestral').select('calificativo'),
    sb.from('registro_asistencia').select('estado').limit(500),
  ]);

  const dist = {AD:0,A:0,B:0,C:0};
  notas?.forEach(n => { if(dist[n.calificativo]!==undefined) dist[n.calificativo]++; });
  const totalNotas = Object.values(dist).reduce((a,b)=>a+b,0)||1;

  const totalAsist = asist?.length||1;
  const presentes = asist?.filter(a=>a.estado==='PRESENTE').length||0;
  const pctAsist = Math.round((presentes/totalAsist)*100);

  const bimAbier = bimestres?.filter(b=>b.estado==='ABIERTO').length||0;

  setContent(`
  <div class="stats-grid">
    <div class="stat-card green"><span class="stat-icon">🎓</span><div class="stat-label">Estudiantes</div><div class="stat-value">${totalEst||0}</div></div>
    <div class="stat-card blue"><span class="stat-icon">👨‍🏫</span><div class="stat-label">Docentes</div><div class="stat-value">${totalDoc||0}</div></div>
    <div class="stat-card purple"><span class="stat-icon">📚</span><div class="stat-label">Cursos</div><div class="stat-value">${totalCursos||0}</div></div>
    <div class="stat-card orange"><span class="stat-icon">✅</span><div class="stat-label">% Asistencia</div><div class="stat-value">${pctAsist}%</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px">
    <div class="card">
      <div class="card-header"><h3 style="font-weight:700;color:var(--g800);font-size:.95rem">📊 Distribución de Calificativos</h3></div>
      <div class="card-body">
        ${['AD','A','B','C'].map(k => {
          const colors = {AD:'#16a34a',A:'#22c55e',B:'#ca8a04',C:'#dc2626'};
          const labels = {AD:'AD – Logro Destacado',A:'A – Logro Esperado',B:'B – En Proceso',C:'C – En Inicio'};
          const pct = Math.round((dist[k]/totalNotas)*100);
          return `<div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px">
              <span style="font-weight:600;color:${colors[k]}">${labels[k]}</span>
              <span style="font-weight:700;color:#64748b">${dist[k]} (${pct}%)</span>
            </div>
            <div style="height:8px;background:#f1f5f9;border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${colors[k]};border-radius:999px;transition:width .5s"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3 style="font-weight:700;color:var(--g800);font-size:.95rem">📅 Estado de Bimestres</h3></div>
      <div class="card-body">
        <div style="background:var(--g50);border-radius:8px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
          <span style="font-size:1.5rem">📅</span>
          <div><b style="color:var(--g800)">${bimAbier} bimestre(s) abierto(s)</b><br><span style="font-size:.78rem;color:#64748b">Registro de notas activo</span></div>
        </div>
        ${[1,2,3,4].map(n => {
          const b = bimestres?.find(x=>x.numero===n);
          const open = b?.estado==='ABIERTO';
          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;margin-bottom:4px;background:${open?'var(--g50)':'#f8fafc'}">
            <span style="font-weight:600;font-size:.84rem">Bimestre ${n}</span>
            ${b ? `<span class="badge badge-${open?'green':'gray'}">${open?'🟢 Abierto':'⚫ Cerrado'}</span>` : '<span class="badge badge-gray">No creado</span>'}
          </div>`;
        }).join('')}
        <div style="margin-top:12px;padding:10px;background:#f8fafc;border-radius:8px;font-size:.75rem;color:#64748b">
          <b>MINEDU RVM N° 033-2022</b><br>AD=Logro Destacado · A=Logro Esperado · B=En Proceso · C=En Inicio
        </div>
      </div>
    </div>
  </div>
  `);
}

async function pageEstudiantes() {
  const [{ data: estudiantes }, { data: secciones }] = await Promise.all([
    sb.from('estudiantes').select('*, secciones(nombre,grado), usuarios(correo,activo)').order('apellido'),
    sb.from('secciones').select('id,nombre,grado').order('grado'),
  ]);

  const render = (list) => `
  <div class="card">
    <div class="card-header">
      <span style="font-weight:700;color:var(--g800)">${list.length} estudiantes</span>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" style="width:220px;padding:7px 10px" placeholder="🔍 Buscar por nombre o DNI…" oninput="filterTable(this,'est-table')" id="est-search"/>
        <button class="btn btn-primary btn-sm" onclick="modalEstudiante()">+ Nuevo</button>
      </div>
    </div>
    <div class="table-wrap">
      ${list.length ? `
      <table id="est-table">
        <thead><tr><th>Apellidos y Nombre</th><th>DNI</th><th>Grado</th><th>Sección</th><th>Correo</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
        ${list.map(e=>`<tr>
          <td><b>${e.apellido || ''}, ${e.nombre}</b></td>
          <td>${e.dni||'—'}</td>
          <td>${e.grado||'—'}°</td>
          <td>${e.secciones ? e.secciones.grado+'° '+e.secciones.nombre : '—'}</td>
          <td style="font-size:.78rem;color:#64748b">${e.usuarios?.correo||'—'}</td>
          <td><span class="badge badge-${e.usuarios?.activo!==false?'green':'gray'}">${e.usuarios?.activo!==false?'Activo':'Inactivo'}</span></td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="modalEstudiante(${JSON.stringify(e).replace(/"/g,'&quot;')})">Editar</button>
            <button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="confirmDelete('estudiantes','${norm(e.id)}','${e.nombre} ${e.apellido}')">Eliminar</button>
          </td>
        </tr>`).join('')}
        </tbody>
      </table>` : '<div class="empty-state"><div class="ico">🎓</div><p>Sin estudiantes registrados</p></div>'}
    </div>
  </div>`;

  setContent(render(estudiantes||[]));

}

window.filterTable = (input, tableId) => {
  const q = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(tr => {
    tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
};

window.modalEstudiante = async (est=null) => {
  const secciones = window._secciones || [];
  const title = est ? 'Editar Estudiante' : 'Nuevo Estudiante';
  showModal(title, `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="m-nombre" placeholder="Ej: Juan Carlos" value="${est?.nombre||''}"/></div>
      <div class="form-group"><label class="form-label">Apellido</label><input class="form-input" id="m-apellido" placeholder="Ej: Pérez Quispe" value="${est?.apellido||''}"/></div>
      <div class="form-group"><label class="form-label">DNI</label><input class="form-input" id="m-dni" placeholder="Ej: 74521836" value="${est?.dni||''}"/></div>
      <div class="form-group"><label class="form-label">Fecha nacimiento</label><input class="form-input" type="date" id="m-fnac" value="${est?.fecha_nacimiento||''}"/></div>
      <div class="form-group"><label class="form-label">Grado</label>
        <select class="form-input" id="m-grado">${[1,2,3,4,5,6].map(n=>`<option value="${n}" ${est?.grado==n?'selected':''}>${n}°</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Sección</label>
        <select class="form-input" id="m-seccion">
          <option value="">Sin sección</option>
          ${secciones.map(s=>`<option value="${norm(s.id)}" ${norm(est?.seccion_id)===norm(s.id)?'selected':''}>${s.grado}° ${s.nombre}</option>`).join('')}
        </select></div>
      ${!est ? `
      <div class="form-group form-full"><label class="form-label">Correo</label><input class="form-input" type="email" id="m-correo" placeholder="Ej: juan.perez@colegio.edu.pe"/></div>
      <div class="form-group form-full"><label class="form-label">Contraseña inicial</label><input class="form-input" type="password" id="m-pass" placeholder="Ej: Estudiante2026#"/></div>` : ''}
    </div>`,
    async () => {
      const payload = {
        nombre: document.getElementById('m-nombre').value.trim(),
        apellido: document.getElementById('m-apellido').value.trim(),
        dni: document.getElementById('m-dni').value.trim(),
        fecha_nacimiento: document.getElementById('m-fnac').value || null,
        grado: document.getElementById('m-grado').value,
        seccion_id: document.getElementById('m-seccion').value || null,
      };
      if (!payload.nombre || !payload.apellido) { toast('Nombre y apellido requeridos','error'); return; }

      if (est) {
        const { error } = await sb.from('estudiantes').update(payload).eq('id', norm(est.id));
        if (error) { toast(error.message,'error'); return; }
      } else {
        const correo = document.getElementById('m-correo').value.trim();
        const pass = document.getElementById('m-pass').value;
       if (!correo || !pass) { toast('Correo y contraseña requeridos', 'error'); return; }
      if (pass.length < 6) { toast('La contraseña debe tener al menos 6 caracteres', 'error'); return; }

      // 1. Crear en Supabase Auth
       const { data: authData, error: authError } = await sb.auth.signUp({
        email: correo,
        password: pass
        });
        if (authError) { toast('Error al crear usuario: ' + authError.message, 'error'); return; }

       // 2. Insertar en tabla usuarios con auth_id vinculado
       const { data: user, error: ue } = await sb.from('usuarios').insert({
       nombre: `${payload.nombre} ${payload.apellido}`,
       correo,
        contrasena_hash: '—',
       rol: 'ESTUDIANTE',
       activo: true,
     auth_id: authData.user.id
       }).select().single();
        if (ue) {
        await sb.auth.admin.deleteUser(authData.user.id);
      toast(ue.message, 'error'); return;
       }

       // 3. Insertar en tabla estudiantes
       const { error } = await sb.from('estudiantes').insert({ ...payload, usuario_id: norm(user.id) });
        if (error) {
        await sb.auth.admin.deleteUser(authData.user.id);
        toast(error.message, 'error'); return;
        }
      }
      toast(est ? 'Estudiante actualizado' : 'Estudiante creado');
      closeModal(); pageEstudiantes();
    }
  );
};

window.confirmDelete = async (table, id, nombre) => {
  showModal('Confirmar eliminación', `<p>¿Eliminar <b>${nombre}</b>?</p>`,
    async () => {
      await sb.from(table).delete().eq('id', id);
      toast('Eliminado'); closeModal();
      if (table==='estudiantes') pageEstudiantes();
      else if (table==='docentes') pageDocentes();
      else if (table==='cursos') pageCursos();
      else if (table==='secciones') pageSecciones();
      else if (table==='asignacion_docente') pageAsignaciones();
    }, '🗑️ Eliminar', true
  );
};

// DOCENTES (ADMIN)

async function pageDocentes() {
  const { data: docentes } = await sb.from('docentes').select('*, usuarios(correo,activo)').order('apellido');

  setContent(`
  <div class="card">
    <div class="card-header">
      <span style="font-weight:700;color:var(--g800)">${docentes?.length||0} docentes</span>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" style="width:200px;padding:7px 10px" placeholder="🔍 Buscar por nombre o especialidad…" oninput="filterTable(this,'doc-table')"/>
        <button class="btn btn-primary btn-sm" onclick="modalDocente()">+ Nuevo</button>
      </div>
    </div>
    <div class="table-wrap">
      ${docentes?.length ? `
      <table id="doc-table">
        <thead><tr><th>Apellidos y Nombre</th><th>DNI</th><th>Especialidad</th><th>Teléfono</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
        ${docentes.map(d=>`<tr>
          <td><b>${d.apellido||''}, ${d.nombre}</b></td>
          <td>${d.dni||'—'}</td>
          <td>${d.especialidad||'—'}</td>
          <td>${d.telefono||'—'}</td>
          <td><span class="badge badge-${d.usuarios?.activo!==false?'green':'gray'}">${d.usuarios?.activo!==false?'Activo':'Inactivo'}</span></td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="modalDocente(${JSON.stringify(d).replace(/"/g,'&quot;')})">Editar</button>
            <button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="confirmDelete('docentes','${norm(d.id)}','${d.nombre} ${d.apellido}')">Eliminar</button>
          </td>
        </tr>`).join('')}
        </tbody>
      </table>` : '<div class="empty-state"><div class="ico">👨‍🏫</div><p>Sin docentes</p></div>'}
    </div>
  </div>`);
}

window.modalDocente = (doc=null) => {
  showModal(doc ? 'Editar Docente' : 'Nuevo Docente', `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="m-nombre" placeholder="Ej: María Elena" value="${doc?.nombre||''}"/></div>
      <div class="form-group"><label class="form-label">Apellido</label><input class="form-input" id="m-apellido" placeholder="Ej: Torres Huanca" value="${doc?.apellido||''}"/></div>
      <div class="form-group"><label class="form-label">DNI</label><input class="form-input" id="m-dni" placeholder="Ej: 42318756" value="${doc?.dni||''}"/></div>
      <div class="form-group"><label class="form-label">Especialidad</label><input class="form-input" id="m-esp" placeholder="Ej: Matemática, Comunicación…" value="${doc?.especialidad||''}"/></div>
      <div class="form-group form-full"><label class="form-label">Teléfono</label><input class="form-input" id="m-tel" placeholder="Ej: 987654321" value="${doc?.telefono||''}"/></div>
      ${!doc ? `
      <div class="form-group form-full"><label class="form-label">Correo</label><input class="form-input" type="email" id="m-correo" placeholder="Ej: m.torres@colegio.edu.pe"/></div>
      <div class="form-group form-full"><label class="form-label">Contraseña inicial</label><input class="form-input" type="password" id="m-pass" placeholder="Ej: Docente2026#"/></div>` : ''}
    </div>`,
    async () => {
      const payload = {
        nombre: document.getElementById('m-nombre').value.trim(),
        apellido: document.getElementById('m-apellido').value.trim(),
        dni: document.getElementById('m-dni').value.trim(),
        especialidad: document.getElementById('m-esp').value.trim(),
        telefono: document.getElementById('m-tel').value.trim(),
      };
      if (!payload.nombre || !payload.apellido) { toast('Nombre y apellido requeridos','error'); return; }

      if (doc) {
        const { error } = await sb.from('docentes').update(payload).eq('id', norm(doc.id));
        if (error) { toast(error.message,'error'); return; }
      } else {
        const correo = document.getElementById('m-correo').value.trim();
        const pass = document.getElementById('m-pass').value;
        if (!correo || !pass) { toast('Correo y contraseña requeridos', 'error'); return; }
        if (pass.length < 6) { toast('La contraseña debe tener al menos 6 caracteres', 'error'); return; }

        // 1. Crear en Supabase Auth (bcrypt lo maneja Supabase, no el frontend)
       const { data: authData, error: authError } = await sb.auth.signUp({
       email: correo,
        password: pass
        });
        if (authError) { toast('Error al crear usuario: ' + authError.message, 'error'); return; }

        // 2. Insertar en tabla usuarios vinculando el auth_id
       const { data: user, error: ue } = await sb.from('usuarios').insert({
      nombre: `${payload.nombre} ${payload.apellido}`,
       correo,
       contrasena_hash: '—',  // ya no se usa, Auth maneja la contraseña
        rol: 'DOCENTE',
        activo: true,
        auth_id: authData.user.id
      }).select().single();
      if (ue) {
       // Si falla la inserción, eliminar el usuario de Auth para no dejar inconsistencias
         await sb.auth.admin.deleteUser(authData.user.id);
       toast(ue.message, 'error'); return;
      }

      // 3. Insertar en tabla docentes
       const { error } = await sb.from('docentes').insert({ ...payload, usuario_id: norm(user.id) });
        if (error) { toast(error.message, 'error'); return; }
      }
      toast(doc ? 'Docente actualizado' : 'Docente creado');
      closeModal(); pageDocentes();
    }
  );
};

      if (error) { toast(error.message,'error'); return; }

window.deleteComp = async (id) => {
  const { error } = await sb.from('competencias').delete().eq('id', id);

async function pageAsignaciones() {
  const [{ data: asig }, { data: docentes }, { data: cursos }, { data: secciones }, { data: anos }] = await Promise.all([
    sb.from('asignacion_docente').select('*, docentes(nombre,apellido), cursos(nombre), secciones(nombre,grado), ano_escolar(anio)').order('created_at',{ascending:false}),
    sb.from('docentes').select('id,nombre,apellido').order('apellido'),
    sb.from('cursos').select('id,nombre').order('nombre'),
    sb.from('secciones').select('id,nombre,grado').order('grado'),
    sb.from('ano_escolar').select('id,anio').order('anio',{ascending:false}),
  ]);
  window._docentes=docentes||[]; window._cursos=cursos||[]; window._secciones=secciones||[]; window._anos=anos||[];

  setContent(`
  <div class="card">
    <div class="card-header">
      <span style="font-weight:700;color:var(--g800)">${asig?.length||0} asignaciones</span>
      <button class="btn btn-primary btn-sm" onclick="modalAsignacion()">+ Nueva asignación</button>
    </div>
    <div class="table-wrap">
      ${asig?.length ? `
      <table>
        <thead><tr><th>Docente</th><th>Curso</th><th>Sección</th><th>Año</th><th>Acción</th></tr></thead>
        <tbody>
        ${asig.map(a=>`<tr>
          <td>${a.docentes?.apellido}, ${a.docentes?.nombre}</td>
          <td>${a.cursos?.nombre}</td>
          <td>${a.secciones?.grado}° ${a.secciones?.nombre}</td>
          <td>${a.ano_escolar?.anio||'—'}</td>

        </tr>`).join('')}
        </tbody>
      </table>` : '<div class="empty-state"><div class="ico">🔗</div><p>Sin asignaciones</p></div>'}
    </div>
  </div>`);
}

window.modalAsignacion = () => {
  const d=window._docentes||[], c=window._cursos||[], s=window._secciones||[], a=window._anos||[];
  showModal('Nueva Asignación', `
    <div class="form-group"><label class="form-label">Docente</label>
      <select class="form-input" id="m-doc"><option value="">Seleccionar...</option>${d.map(x=>`<option value="${norm(x.id)}">${x.apellido}, ${x.nombre}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Curso</label>
      <select class="form-input" id="m-cur"><option value="">Seleccionar...</option>${c.map(x=>`<option value="${norm(x.id)}">${x.nombre}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Sección</label>
      <select class="form-input" id="m-sec"><option value="">Seleccionar...</option>${s.map(x=>`<option value="${norm(x.id)}">${x.grado}° ${x.nombre}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Año Escolar</label>
      <select class="form-input" id="m-ano"><option value="">Seleccionar...</option>${a.map(x=>`<option value="${norm(x.id)}">${x.anio}</option>`).join('')}</select></div>`,
    async () => {
      const payload = { docente_id:document.getElementById('m-doc').value, curso_id:document.getElementById('m-cur').value, seccion_id:document.getElementById('m-sec').value, ano_escolar_id:document.getElementById('m-ano').value||null };
      if (!payload.docente_id||!payload.curso_id||!payload.seccion_id) { toast('Completa todos los campos','error'); return; }

// ═══════════════════════════════════════════════════════════════
// AÑO ESCOLAR
// ═══════════════════════════════════════════════════════════════
async function pageAnoEscolar() {
  const [{ data: anos }, { data: bimestres }] = await Promise.all([
    sb.from('ano_escolar').select('*').order('anio',{ascending:false}),
    sb.from('bimestres').select('*').order('numero'),
  ]);

  setContent(`
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px">
    <button class="btn btn-secondary" onclick="modalBimestre()">+ Bimestre</button>
    <button class="btn btn-primary" onclick="modalAno()">+ Año Escolar</button>
  </div>
  ${anos?.length ? anos.map(ano => {
    const bimsAno = bimestres?.filter(b=>norm(b.ano_escolar_id)===norm(ano.id))||[];
    return `<div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <div>
          <b style="font-size:1.1rem;color:var(--g800)">${ano.anio}</b>
          <div style="font-size:.78rem;color:#64748b">${ano.fecha_inicio||''} → ${ano.fecha_fin||''}</div>
        </div>
        <span class="badge badge-${ano.activo?'green':'gray'}">${ano.activo?'🟢 Activo':'Inactivo'}</span>
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[1,2,3,4].map(n => {
          const b = bimsAno.find(x=>x.numero===n);
          const open = b?.estado==='ABIERTO';
          return `<div style="border-radius:10px;border:1px solid ${open?'var(--g300)':'#e2e8f0'};padding:12px;background:${open?'var(--g50)':'#f8fafc'}">
            <b style="font-size:.85rem;color:${open?'var(--g800)':'#64748b'}">Bimestre ${n}</b>
            ${b ? `<div style="font-size:.72rem;color:#94a3b8;margin:3px 0">${b.fecha_inicio||''}<br>${b.fecha_fin||''}</div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
                <span style="font-size:.75rem;font-weight:700;color:${open?'var(--g600)':'#94a3b8'}">${open?'🟢 Abierto':'⚫ Cerrado'}</span>
                <button class="btn btn-sm" style="padding:3px 8px;background:${open?'#fee2e2':'#dcfce7'};color:${open?'#dc2626':'var(--g700)'};border:none;border-radius:6px;cursor:pointer;font-size:.72rem;font-weight:700"
                  onclick="toggleBimestre('${norm(b.id)}','${b.estado}')">${open?'Cerrar':'Abrir'}</button>
              </div>` : '<p style="font-size:.75rem;color:#94a3b8;margin-top:4px;font-style:italic">No creado</p>'}
          </div>`;
        }).join('')}
        </div>
      </div>
    </div>`;
  }).join('') : '<div class="empty-state"><div class="ico">📅</div><p>Sin años escolares</p></div>'}
  `);
  window._anos_data = anos||[];
}

window.toggleBimestre = async (id, estado) => {
  const nuevo = estado==='ABIERTO' ? 'CERRADO' : 'ABIERTO';
  const { error } = await sb.from('bimestres').update({estado:nuevo}).eq('id',id);
  if (error) toast(error.message,'error');
  else { toast(`Bimestre ${nuevo==='ABIERTO'?'abierto':'cerrado'}`); pageAnoEscolar(); }
};

window.modalAno = () => {
  showModal('Nuevo Año Escolar', `
    <div class="form-group"><label class="form-label">Año</label><input class="form-input" type="number" id="m-anio" placeholder="Ej: 2026" value="${new Date().getFullYear()}"/></div>
    <div class="form-group"><label class="form-label">Fecha inicio</label><input class="form-input" type="date" id="m-ini" placeholder="Ej: 2026-03-09"/></div>
    <div class="form-group"><label class="form-label">Fecha fin</label><input class="form-input" type="date" id="m-fin" placeholder="Ej: 2026-12-18"/></div>`,
    async () => {
      const { error } = await sb.from('ano_escolar').insert({ anio:document.getElementById('m-anio').value, fecha_inicio:document.getElementById('m-ini').value, fecha_fin:document.getElementById('m-fin').value, activo:true });
      if (error) { toast(error.message,'error'); return; }
      toast('Año escolar creado'); closeModal(); pageAnoEscolar();
    }
  );
};

window.modalBimestre = () => {
  const anos = window._anos_data||[];
  showModal('Nuevo Bimestre', `

window.modalRegistrarNotas = async (evalId, evalNombre, bimEstado) => {
  if (bimEstado==='CERRADO') { toast('El bimestre está cerrado — no se puede editar','error'); return; }

  // Obtener la evaluacion y su competencia/bimestre para conocer la sección
  const { data: evalData } = await sb.from('evaluaciones').select('*, competencias(curso_id)').eq('id',evalId).single();
  const docenteId = norm(currentPerfil?.id);

  // Obtener asignacion para saber la sección
  const { data: asig } = await sb.from('asignacion_docente').select('seccion_id').eq('docente_id',docenteId).eq('competencia_id_check',evalData?.competencias?.curso_id||'').limit(1);

  // Obtener estudiantes de todas las secciones del docente
  const { data: myAsig } = await sb.from('asignacion_docente').select('seccion_id, secciones(nombre,grado)').eq('docente_id',docenteId);
  const seccionIds = [...new Set((myAsig||[]).map(a=>norm(a.seccion_id)))];

  let estudiantes = [];
  for (const sid of seccionIds) {
    const { data: ests } = await sb.from('estudiantes').select('id,nombre,apellido,seccion_id').eq('seccion_id',sid).order('apellido');
    if (ests) estudiantes.push(...ests);
  }

  // Notas existentes
  const { data: notasExist } = await sb.from('nota_evaluacion').select('*').eq('evaluacion_id',evalId);
  const notasMap = {};
  (notasExist||[]).forEach(n => { notasMap[norm(n.estudiante_id)] = n; });

  const html = `
  <div style="margin-bottom:12px">
    <b style="color:var(--g800)">${evalNombre}</b>
    <p style="font-size:.78rem;color:#64748b">${estudiantes.length} estudiantes</p>
  </div>
  <div style="max-height:350px;overflow-y:auto">
    <table style="width:100%">
      <thead><tr><th>Estudiante</th><th>Calificativo</th><th>Observación</th></tr></thead>
      <tbody id="notas-tbody">
      ${estudiantes.map(e=>{
        const n = notasMap[norm(e.id)]||{};
        return `<tr>
          <td style="font-size:.83rem">${e.apellido}, ${e.nombre}</td>
          <td>
            <select class="form-input" style="padding:4px 8px;width:80px" data-est="${norm(e.id)}" id="cal-${norm(e.id)}">
              <option value="">--</option>
              ${['AD','A','B','C'].map(v=>`<option value="${v}" ${n.calificativo===v?'selected':''}>${v}</option>`).join('')}
            </select>
          </td>
          <td><input class="form-input" style="padding:4px 8px;font-size:.8rem" id="obs-${norm(e.id)}" placeholder="Ej: Mejoró en la última semana" value="${n.observacion||''}"/></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  </div>`;

  showModal(`Registrar Notas — ${evalNombre}`, html, async () => {
    const rows = document.querySelectorAll('#notas-tbody tr');
    const saves = [];
    rows.forEach(tr => {
      const sel = tr.querySelector('select[data-est]');
      const estId = sel?.dataset.est;
      const cal = sel?.value;
      const obs = tr.querySelector(`#obs-${estId}`)?.value||'';
      if (cal && estId) saves.push({ evaluacion_id:evalId, estudiante_id:estId, calificativo:cal, observacion:obs||null });
    });

    for (const s of saves) {
      const exist = notasMap[s.estudiante_id];
      if (exist) await sb.from('nota_evaluacion').update({calificativo:s.calificativo,observacion:s.observacion}).eq('id',norm(exist.id));
      else await sb.from('nota_evaluacion').insert(s);
    }
    toast(`${saves.length} notas guardadas`); closeModal();
  }, '💾 Guardar notas');
};

window.loadCBGrid = async () => {
  const secId = document.getElementById('flt-sec-cb')?.value;
  const bimId = document.getElementById('flt-bim-cb')?.value;
  if (!secId||!bimId) return;

  const bim = (window._bimestres||[]).find(b=>norm(b.id)===bimId);
  const closed = bim?.estado==='CERRADO';
  const docenteId = norm(currentPerfil?.id);

  const [{ data: estudiantes }, { data: cbExist }, { data: asig }] = await Promise.all([
    sb.from('estudiantes').select('id,nombre,apellido').eq('seccion_id',secId).order('apellido'),
    sb.from('calificativo_bimestral').select('*').eq('bimestre_id',bimId).eq('docente_id',docenteId),
    sb.from('asignacion_docente').select('cursos(id,nombre,competencias(*))').eq('docente_id',docenteId).eq('seccion_id',secId),
  ]);

  const competencias = [];
  (asig||[]).forEach(a => (a.cursos?.competencias||[]).forEach(c => competencias.push({...c, cursoNombre:a.cursos?.nombre})));
  const uniqComps = [...new Map(competencias.map(c=>[norm(c.id),c])).values()];

  const cbMap = {};
  (cbExist||[]).forEach(c => { cbMap[`${norm(c.estudiante_id)}_${norm(c.competencia_id)}`] = c; });

  const grid = document.getElementById('cb-grid');
  if (!estudiantes?.length) { grid.innerHTML = '<div class="empty-state"><p>Sin estudiantes en esta sección</p></div>'; return; }
  if (!uniqComps.length) { grid.innerHTML = '<div class="empty-state"><p>Sin competencias asignadas para esta sección</p></div>'; return; }

  grid.innerHTML = `
  ${closed ? '<div class="alert alert-warning">⚠️ Bimestre cerrado — solo lectura</div>' : ''}
  <div class="card">
    <div class="card-header">
      <span style="font-weight:700;font-size:.9rem;color:var(--g800)">Calificativo Bimestral — B${bim?.numero}</span>
      ${!closed ? `<button class="btn btn-primary btn-sm" onclick="saveCBAll('${bimId}')">💾 Guardar todo</button>` : ''}
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Estudiante</th>
            ${uniqComps.map(c=>`<th title="${c.nombre}">${c.cursoNombre}<br><small style="font-weight:400;text-transform:none;letter-spacing:0">${c.nombre.length>20?c.nombre.substring(0,20)+'…':c.nombre}</small></th>`).join('')}
          </tr>
        </thead>
        <tbody>
        ${(estudiantes||[]).map(e=>`<tr>
          <td style="font-size:.83rem;white-space:nowrap"><b>${e.apellido}, ${e.nombre}</b></td>
          ${uniqComps.map(c=>{
            const key = `${norm(e.id)}_${norm(c.id)}`;
            const exist = cbMap[key];
            return `<td>
              ${closed
                ? `<span class="badge badge-${exist?.calificativo||'gray'}">${exist?.calificativo||'—'}</span>`
                : `<select class="form-input" style="padding:3px 6px;width:75px;font-size:.82rem;font-weight:700" id="cb-${norm(e.id)}-${norm(c.id)}" data-est="${norm(e.id)}" data-comp="${norm(c.id)}">
                    <option value="">--</option>
                    ${['AD','A','B','C'].map(v=>`<option value="${v}" ${exist?.calificativo===v?'selected':''}>${v}</option>`).join('')}
                  </select>`}
            </td>`;
          }).join('')}
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
};

window.saveCBAll = async (bimId) => {
  const docenteId = norm(currentPerfil?.id);
  const selects = document.querySelectorAll('select[data-est][data-comp]');
  let saved = 0;
  for (const sel of selects) {
    const val = sel.value;
    if (!val) continue;
    const estId = sel.dataset.est, compId = sel.dataset.comp;
    const { data: exist } = await sb.from('calificativo_bimestral').select('id').eq('estudiante_id',estId).eq('competencia_id',compId).eq('bimestre_id',bimId).single();
    if (exist) await sb.from('calificativo_bimestral').update({calificativo:val,docente_id:docenteId}).eq('id',norm(exist.id));
    else await sb.from('calificativo_bimestral').insert({estudiante_id:estId,competencia_id:compId,bimestre_id:bimId,calificativo:val,docente_id:docenteId});
    saved++;
  }
  toast(`${saved} calificativos guardados`);
};

window.loadCFGrid = async () => {
  const secId = document.getElementById('flt-sec-cf')?.value;
  const anoId = document.getElementById('flt-ano-cf')?.value;
  if (!secId||!anoId) return;

  const docenteId = norm(currentPerfil?.id);
  const [{ data: estudiantes }, { data: cfExist }, { data: asig }] = await Promise.all([
    sb.from('estudiantes').select('id,nombre,apellido').eq('seccion_id',secId).order('apellido'),
    sb.from('calificativo_final').select('*').eq('ano_escolar_id',anoId).eq('docente_id',docenteId),
    sb.from('asignacion_docente').select('cursos(id,nombre,competencias(*))').eq('docente_id',docenteId).eq('seccion_id',secId),
  ]);

  const competencias = [];
  (asig||[]).forEach(a => (a.cursos?.competencias||[]).forEach(c => competencias.push({...c, cursoNombre:a.cursos?.nombre})));
  const uniqComps = [...new Map(competencias.map(c=>[norm(c.id),c])).values()];
  const cfMap = {};
  (cfExist||[]).forEach(c => { cfMap[`${norm(c.estudiante_id)}_${norm(c.competencia_id)}`] = c; });

  const grid = document.getElementById('cf-grid');
  if (!estudiantes?.length || !uniqComps.length) {
    grid.innerHTML = '<div class="empty-state"><p>Sin datos para mostrar</p></div>'; return;
  }

  const estadoEst = (e) => {
    const misC = uniqComps.filter(c => cfMap[`${norm(e.id)}_${norm(c.id)}`]?.calificativo === 'C').length;
    if (misC >= 4) return {label:'REPITENTE',cls:'badge-red'};
    if (misC >= 1) return {label:'EN RECUPERACIÓN',cls:'badge-yellow'};
    return {label:'PROMOVIDO',cls:'badge-green'};
  };

  grid.innerHTML = `
  <div class="card">
    <div class="card-header">
      <span style="font-weight:700;font-size:.9rem;color:var(--g800)">Calificativo Final — Año Escolar</span>
      <button class="btn btn-primary btn-sm" onclick="saveCFAll('${anoId}')">💾 Guardar todo</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Estudiante</th>
            ${uniqComps.map(c=>`<th title="${c.nombre}">${c.cursoNombre}<br><small style="font-weight:400;text-transform:none;letter-spacing:0">${c.nombre.length>18?c.nombre.substring(0,18)+'…':c.nombre}</small></th>`).join('')}
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
        ${(estudiantes||[]).map(e=>{
          const est = estadoEst(e);

window.switchTab = (btn, tabId) => {
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const parent = btn.closest('.tabs').nextElementSibling;
  let next = parent;
  while (next) {
    if (next.id && !next.classList.contains('tabs')) next.style.display = 'none';
    next = next.nextElementSibling;
  }
  // simpler approach - hide all tab divs
  document.querySelectorAll('[id^="tab-"]').forEach(d=>d.style.display='none');
  document.getElementById(tabId).style.display='block';
};

        ${[...new Map((cb||[]).map(c=>[`${c.competencias?.cursos?.nombre}_${c.competencias?.nombre}`,c])).values()].map(row=>{
          const bims = {};
          (cb||[]).filter(c=>c.competencias?.nombre===row.competencias?.nombre).forEach(c=>{ bims[c.bimestres?.numero]=c.calificativo; });
          return `<tr>
            <td>${row.competencias?.cursos?.nombre||'—'}</td>
            <td>${row.competencias?.nombre||'—'}</td>
            ${bimestres.map(b=>`<td>${bims[b]?`<span class="badge badge-${bims[b]}">${bims[b]}</span>`:'—'}</td>`).join('')}
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  </div>` : '<div class="empty-state"><div class="ico">📖</div><p>Sin calificativos registrados aún</p></div>'}
  `);

  window._libretaData = { est, cb, cf, asist, estadoFinal, pct, ausencias, tardanzas };
}

window.generarPDF = async (estId) => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const d = window._libretaData;
  if (!d) { toast('Carga la libreta primero','error'); return; }

  const { est, cb, cf, pct, ausencias, tardanzas, estadoFinal } = d;

  // Header verde
  doc.setFillColor(21, 128, 61);
  doc.rect(0, 0, 210, 35, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('COLEGIO ANTIOQUIA', 105, 14, {align:'center'});
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('LIBRETA DE NOTAS — Sistema MINEDU RVM N° 033-2022', 105, 21, {align:'center'});

  // Datos estudiante
  doc.setTextColor(0,0,0);
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(`${est?.apellido||''}, ${est?.nombre||''}`, 14, 45);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(`Grado: ${est?.secciones?.grado||''}° | Sección: ${est?.secciones?.nombre||''} | Generado: ${new Date().toLocaleDateString('es-PE')}`, 14, 52);

  // Estado
  const estadoColors = {PROMOVIDO:[21,128,61], EN_RECUPERACION:[202,138,4], REPITENTE:[220,38,38]};
  const [r,g,b] = estadoColors[estadoFinal]||[0,0,0];
  doc.setFillColor(r,g,b);
  doc.roundedRect(14, 56, 60, 8, 2, 2, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text(estadoFinal.replace('_',' '), 44, 61.5, {align:'center'});

  // Asistencia
  doc.setTextColor(0,0,0);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(`Asistencia: ${pct}% | Ausencias: ${ausencias} | Tardanzas: ${tardanzas}`, 14, 72);

  // Tabla CF
  if (cf?.length) {
    doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('CALIFICATIVOS FINALES', 14, 82);
    let y = 88;
    doc.setFillColor(240,253,244);
    doc.rect(14, y-4, 182, 6, 'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('CURSO', 16, y); doc.text('COMPETENCIA', 70, y); doc.text('CF', 190, y, {align:'right'});
    y+=7;
    cf.forEach(c => {
      doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text(c.competencias?.cursos?.nombre||'', 16, y);
      doc.text(c.competencias?.nombre||'', 70, y);
      doc.setFont('helvetica','bold');
      doc.text(c.calificativo||'', 190, y, {align:'right'});
      y+=6; if(y>270){doc.addPage();y=20;}
    });
  }

  // Tabla CB
  if (cb?.length) {
    let y = doc.internal.getCurrentPageInfo().pageNumber === 1 ? Math.max(doc.internal.getNumberOfPages()===1?135:20, 20) : 20;
    doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('CALIFICATIVOS BIMESTRALES', 14, y);
    y+=8;
    const bims = [1,2,3,4];
    const cbMap = {};
    (cb||[]).forEach(c=>{ cbMap[`${c.competencias?.nombre}_${c.bimestres?.numero}`]=c.calificativo; });
    const uniqComps = [...new Map((cb||[]).map(c=>[c.competencias?.nombre,c])).values()];

    doc.setFillColor(240,253,244);
    doc.rect(14, y-4, 182, 6, 'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('COMPETENCIA', 16, y); bims.forEach((b,i)=>doc.text(`B${b}`, 155+i*12, y));
    y+=7;
    uniqComps.forEach(comp => {
      doc.setFont('helvetica','normal');
      doc.text(`${comp.competencias?.cursos?.nombre||''} — ${comp.competencias?.nombre||''}`, 16, y);
      bims.forEach((b,i) => {
        const cal = cbMap[`${comp.competencias?.nombre}_${b}`]||'—';
        doc.setFont('helvetica','bold');
        doc.text(cal, 155+i*12, y);
      });
      y+=6; if(y>270){doc.addPage();y=20;}
    });
  }

  // Footer
  const pages = doc.internal.getNumberOfPages();
  for (let i=1;i<=pages;i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(150,150,150);
    doc.text('Colegio Antioquia — Sistema de Notas según MINEDU RVM N° 033-2022', 105, 290, {align:'center'});
  }

  doc.save(`libreta_${est?.apellido||'estudiante'}_${est?.nombre||''}.pdf`);
  toast('📄 PDF descargado');
};

async function pageHijoNotas() {
  const hijoId = norm(currentPerfil?.estudiante_id || currentPerfil?.estudiantes?.id);
  if (!hijoId) { setContent('<div class="alert alert-danger">No se encontró el hijo vinculado</div>'); return; }
  currentPerfil = { ...currentPerfil, id: hijoId };
  await pageMisNotas();
}

async function pageHijoAsistencia() {
  const hijoId = norm(currentPerfil?.estudiante_id || currentPerfil?.estudiantes?.id);
  if (!hijoId) { setContent('<div class="alert alert-danger">No se encontró el hijo vinculado</div>'); return; }
  const orig = currentPerfil?.id;
  currentPerfil = { ...currentPerfil, id: hijoId };
  await pageMiAsistencia();
  if (orig) currentPerfil = { ...currentPerfil, id: orig };
}

// ═══════════════════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════════════════
function showModal(title, body, onConfirm, confirmLabel='✅ Guardar', isDanger=false) {
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  box.innerHTML = `
  <div class="modal-header">
    <h3>${title}</h3>
    <button class="modal-close" onclick="closeModal()">×</button>
  </div>
  <div class="modal-body">${body}</div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn ${isDanger?'btn-danger':'btn-primary'}" id="modal-confirm-btn">${confirmLabel}</button>
  </div>`;
  document.getElementById('modal-confirm-btn').onclick = onConfirm;
  overlay.style.display = 'flex';
}

window.closeModal = () => { document.getElementById('modal-overlay').style.display='none'; };

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
window.toast = (msg, type='success') => {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
};
